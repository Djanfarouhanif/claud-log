<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Log Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 16px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #89b4fa; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label { font-size: 13px; }
    .toggle {
      position: relative; width: 36px; height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #45475a; border-radius: 20px;
      transition: .2s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: #89b4fa; }
    input:checked + .slider:before { transform: translateX(16px); }

    .status {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #313244;
      color: #a6adc8;
      margin-top: 8px;
    }
    .status.ok { color: #a6e3a1; }
    .status.err { color: #f38ba8; }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 7px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #74c7ec; }
  </style>
</head>
<body>
  <h1>Claude Log Bridge</h1>
  <div class="row">
    <label for="enabledToggle">Capture logs</label>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>
  <div id="serverStatus" class="status">Checking server…</div>
  <button id="testBtn">Send test log</button>

  <script src="popup.js"></script>
</body>
</html>
